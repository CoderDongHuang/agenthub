server:
  port: 8080

spring:
  application:
    name: ai-agent-hub-java-console

  datasource:
    url: jdbc:postgresql://localhost:5432/agenthub
    username: agenthub
    password: agenthub123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6380

  security:
    jwt:
      secret: CHANGE_ME_IN_PRODUCTION_USE_256_BIT_KEY
      expiration-ms: 86400000  # 24 小时

# gRPC Server 配置
grpc:
  server:
    port: 9090

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# 日志
logging:
  level:
    com.agenthub: DEBUG
    org.springframework.security: INFO
